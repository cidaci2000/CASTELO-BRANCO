<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produto | SportLife Elite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-purple: #4f46e5;
            --deep-purple: #1e1b4b;
            --neon-glow: #818cf8;
            --bg-black: #0a0a0f;
            --card-gray: rgba(255, 255, 255, 0.03);
            --border: rgba(79, 70, 229, 0.15); 
            --text-muted: #94a3b8;
            --input-bg: rgba(255, 255, 255, 0.02);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* Glows de Fundo */
        .glow {
            position: fixed;
            width: 450px;
            height: 450px;
            background: #3730a3;
            filter: blur(150px);
            border-radius: 50%;
            opacity: 0.1;
            z-index: -1;
        }

        /* Header */
        header {
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            background: linear-gradient(to right, #e2e8f0, var(--primary-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        /* Centralização do Card */
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            z-index: 10;
        }

        .card {
            background: var(--card-gray);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            padding: 50px 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        .header-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .header-section h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            line-height: 0.9;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, var(--primary-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        /* Formulário Estilizado */
        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--neon-glow);
            margin-bottom: 8px;
            margin-left: 2px;
        }

        input, select, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 4px;
            color: white;
            font-size: 0.95rem;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-purple);
            background: rgba(79, 70, 229, 0.08);
            box-shadow: 0 0 20px rgba(79, 70, 229, 0.15);
        }

        select option {
            background: #0f0f1a;
            color: white;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Botão */
        button {
            width: 100%;
            padding: 20px;
            background: var(--primary-purple);
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        button:hover {
            background: white;
            color: black;
            transform: translateY(-3px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--primary-purple);
        }

        /* Fundo sutil */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1500&q=80') center/cover no-repeat;
            opacity: 0.03;
            filter: grayscale(1);
            z-index: -2;
        }

        @media (max-width: 480px) {
            .card { padding: 40px 25px; border: none; background: transparent; box-shadow: none; }
            .header-section h1 { font-size: 3rem; }
        }
    </style>
</head>

<body>

    <div class="glow" style="top: -150px; left: -150px;"></div>
    <div class="glow" style="bottom: -150px; right: -150px;"></div>
    <div class="bg-overlay"></div>

    <header>
        <a href="#" class="logo">SPORTLIFE</a>
    </header>

    <div class="main-container">
        <div class="card">
            <div class="header-section">
                <h1>CADASTRO DE PRODUTO</h1>
                <p class="subtitle">Adicione novos produtos esportivos</p>
            </div>

            <form>
                <div class="input-group">
                    <label>Nome do Produto</label>
                    <input type="text" placeholder="Ex: Whey Protein, Luva de Boxe" required>
                </div>

                <div class="input-group">
                    <label>Categoria</label>
                    <select required>
                        <option value="" disabled selected>Selecione uma categoria</option>
                        <option>Academia</option>
                        <option>Ciclismo</option>
                        <option>Luta</option>
                        <option>Natação</option>
                        <option>Acessórios</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Preço (R$)</label>
                    <input type="number" step="0.01" placeholder="Ex: 149.90" required>
                </div>

                <div class="input-group">
                    <label>Quantidade em Estoque</label>
                    <input type="number" placeholder="Ex: 50" required>
                </div>

                <div class="input-group">
                    <label>Descrição do Produto</label>
                    <textarea placeholder="Descreva as características do produto..." required></textarea>
                </div>

                <div class="input-group">
                    <label>Imagem do Produto</label>
                    <input type="file" accept="image/*">
                </div>

                <button type="submit">Cadastrar Produto</button>
            </form>

            <a href="index.html" class="back-link">← Voltar para a tela inicial</a>
        </div>
    </div>

</body>
</html>
