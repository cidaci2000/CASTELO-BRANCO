<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportLife Apresentação</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary-purple: #4f46e5;
    --deep-purple: #1e1b4b;
    --neon-glow: #818cf8;
    --bg-black: #0a0a0f;
    --card-gray: rgba(255, 255, 255, 0.03);
    --border: rgba(79, 70, 229, 0.15);
    --text-muted: #94a3b8;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

body {
    background: var(--bg-black);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

/* FUNDO COM IMAGEM */
.bg-overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1500&q=80') center/cover no-repeat;
    opacity: 0.05;
    filter: grayscale(1);
    z-index: -2;
}

/* GLOW */
.glow {
    position: fixed;
    width: 400px;
    height: 400px;
    background: #3730a3;
    
    filter: blur(150px);
    border-radius: 50%;
    opacity: 0.15;
    z-index: -1;
}

/* CONTAINER */
.section {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5%;
}

/* BOX */
.box {
    display: flex;
    gap: 60px;
    max-width: 1200px;
    width: 100%;
    align-items: center;
}

/* VIDEO CARD */
.video-card {
    flex: 1;
    background: var(--card-gray);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(79,70,229,0.3);
    backdrop-filter: blur(10px);
}

.video-card video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TEXTO */
.content {
    flex: 1;
}

/* TÍTULO GEN Z */
.content h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    line-height: 0.9;
    letter-spacing: 2px;
    margin-bottom: 20px;
    text-transform: uppercase;
}

/* GRADIENTE ANIMADO */
.content h1 span {
    background: linear-gradient(90deg, #fff, var(--primary-purple), #fff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
}

@keyframes shine {
    to { background-position: 200% center; }
}

.content p {
    color: var(--text-muted);
    margin-bottom: 25px;
    line-height: 1.6;
}

/* BOTÃO */
.btn {
    padding: 18px 35px;
    background: var(--primary-purple);
    color: white;
    text-decoration: none;
    font-weight: 800;
    letter-spacing: 2px;
    border-radius: 4px;
    transition: 0.3s;
    display: inline-block;
}

.btn:hover {
    background: white;
    color: black;
    transform: translateY(-3px);
}

/* RESPONSIVO */
@media(max-width: 900px){
    .box {
        flex-direction: column;
        text-align: center;
    }

    .content h1 {
        font-size: 3.5rem;
    }
}
</style>
</head>

<body>

<div class="bg-overlay"></div>
<div class="glow" style="top:-100px; left:-100px;"></div>
<div class="glow" style="bottom:-100px; right:-100px;"></div>

<section class="section">

    <div class="box">

        <!-- VIDEO -->
        <div class="video-card">
            <video autoplay muted loop>
                <source src="seu-video.mp4" type="video/mp4">
            </video>
        </div>

        <!-- TEXTO -->
        <div class="content">
            <h1>
                TREINE NO<br>
                <span>SEU MÁXIMO</span>
            </h1>

            <p>
                Tecnologia, performance e evolução em um só lugar.
                Aqui você não treina — você evolui.
            </p>

            <p>
                Estrutura premium, acompanhamento inteligente e uma experiência
                criada para quem quer resultado de verdade.
            </p>
<!-- 
            <a href="#" class="btn">COMEÇAR AGORA</a> -->
        </div>

    </div>

</section>

</body>
</html>
