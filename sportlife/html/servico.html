<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Serviço | SportLife Elite</title>
   
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
   
    <style>
        :root {
            --primary-purple: #4f46e5;
            --deep-purple: #1e1b4b;
            --neon-glow: #818cf8;
            --bg-black: #0a0a0f;
            --card-gray: rgba(255, 255, 255, 0.03);
            --border: rgba(79, 70, 229, 0.15);
            --text-muted: #94a3b8;
            --input-bg: rgba(255, 255, 255, 0.02);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* Glows de Fundo */
        .glow {
            position: fixed;
            width: 450px;
            height: 450px;
            background: #3730a3;
            filter: blur(150px);
            border-radius: 50%;
            opacity: 0.1;
            z-index: -1;
        }

        /* Imagem de fundo sutil */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1500&q=80') center/cover no-repeat;
            opacity: 0.03;
            filter: grayscale(1);
            z-index: -2;
        }

        /* Header igual à Home/Cadastro */
        header {
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            background: linear-gradient(to right, #e2e8f0, var(--primary-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        /* Centralização do Card */
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            z-index: 10;
        }

        .card {
            background: var(--card-gray);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            padding: 50px 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 550px; /* Levemente maior para acomodar o grid de 2 colunas */
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        .header-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .header-section h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            line-height: 0.9;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, var(--primary-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        /* Formulário em Grid */
        form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px 20px;
        }

        .full-width { grid-column: span 2; }

        .input-group {
            margin-bottom: 10px;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--neon-glow);
            margin-bottom: 8px;
            margin-left: 2px;
        }

        input, select, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 4px;
            color: white;
            font-size: 0.9rem;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        textarea {
            height: 100px;
            resize: none;
            font-size: 0.85rem;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-purple);
            background: rgba(79, 70, 229, 0.08);
            box-shadow: 0 0 20px rgba(79, 70, 229, 0.15);
        }

        select option {
            background: #0f0f1a;
            color: white;
        }

        /* Botão estilizado igual à tela de usuário */
        .btn-submit {
            grid-column: span 2;
            width: 100%;
            padding: 20px;
            background: var(--primary-purple);
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .btn-submit:hover {
            background: white;
            color: black;
            transform: translateY(-3px);
        }

        .footer-link {
            grid-column: span 2;
            text-align: center;
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .footer-link a {
            color: white;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            margin-left: 5px;
            transition: 0.3s;
            border-bottom: 1px solid transparent;
        }

        .footer-link a:hover {
            color: var(--primary-purple);
            border-bottom: 1px solid var(--primary-purple);
        }

        @media (max-width: 600px) {
            form { grid-template-columns: 1fr; }
            .full-width, .btn-submit, .footer-link { grid-column: span 1; }
            .card { padding: 40px 25px; border: none; background: transparent; box-shadow: none; }
            .header-section h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div class="glow" style="top: -150px; left: -150px;"></div>
    <div class="glow" style="bottom: -150px; right: -150px;"></div>
    <div class="bg-overlay"></div>

    <header>
        <a href="#" class="logo">SPORTLIFE</a>
    </header>

    <div class="main-container">
        <div class="card">
            <div class="header-section">
                <h1>SERVIÇO ELITE</h1>
                <p class="subtitle">Expanda o ecossistema</p>
            </div>

            <form>
                <div class="input-group full-width">
                    <label for="service-name">Nome do Serviço</label>
                    <input type="text" id="service-name" placeholder="EX: PROTOCOLO DE PERFORMANCE" required>
                </div>

                <div class="input-group full-width">
                    <label for="category">Categoria Especializada</label>
                    <select id="category" required>
                        <option value="" disabled selected>SELECIONE A MODALIDADE</option>
                        <option>Spinning</option>
                        <option>Cross</option>
                        <option>Boxe</option>
                        <option>Ritmos</option>
                        <option>Musculação</option>
                        <option>Zumba</option>
                        <option>Funcional</option>
                        <option>GAP</option>
                        <option>Pilates</option>
                        


                    </select>
                </div>

                <div class="input-group">
                    <label for="price">Valor (R$)</label>
                    <input type="number" id="price" step="0.01" placeholder="0,00" required>
                </div>

                <div class="input-group">
                    <label for="duration">Duração</label>
                    <input type="text" id="duration" placeholder="EX: 60 MIN" required>
                </div>

                <div class="input-group full-width">
                    <label for="description">Descrição do Programa</label>
                    <textarea id="description" placeholder="DETALHES TÉCNICOS E METODOLOGIA..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Confirmar Cadastro</button>

                <div class="footer-link">
                    GESTÃO ADMINISTRATIVA? <a href="#">Voltar ao Painel</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
